{% extends 'base.html' %}

{% block title %}Iniciar sesión{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl border border-slate-200 p-8">
    <h1 class="text-3xl font-black text-slate-900">Iniciar sesión</h1>

    <form method="post" class="mt-6 space-y-5">
        {% csrf_token %}

        <div>
            <label class="block font-semibold mb-2">Usuario</label>
            <input type="text" name="username" class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="block font-semibold mb-2">Contraseña</label>
            <input type="password" name="password" class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        {% if form.errors %}
            <div class="bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3">
                Usuario o contraseña incorrectos.
            </div>
        {% endif %}

        <button class="w-full bg-blue-700 text-white py-3 rounded-2xl font-bold hover:bg-blue-800">
            Entrar
        </button>
    </form>
</div>
{% endblock %}
